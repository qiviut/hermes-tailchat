<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hermes Tailchat</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; background: #111827; color: #e5e7eb; }
    .wrap { display: grid; grid-template-columns: 280px 1fr; height: 100vh; }
    .sidebar { border-right: 1px solid #374151; padding: 16px; overflow: auto; }
    .main { display: grid; grid-template-rows: 1fr auto; }
    .messages { padding: 16px; overflow: auto; display: flex; flex-direction: column; gap: 12px; }
    .composer { border-top: 1px solid #374151; padding: 16px; display: flex; gap: 8px; }
    .msg { padding: 10px 12px; border-radius: 12px; max-width: 900px; white-space: pre-wrap; }
    .user { background: #1d4ed8; align-self: flex-end; }
    .assistant { background: #1f2937; align-self: flex-start; }
    .system { background: #3f3f46; align-self: center; }
    button, input { font: inherit; }
    input, textarea { background: #0f172a; color: #e5e7eb; border: 1px solid #374151; border-radius: 8px; padding: 10px; }
    textarea { flex: 1; min-height: 52px; }
    button { background: #2563eb; color: white; border: 0; border-radius: 8px; padding: 10px 14px; cursor: pointer; }
    .chat-item { padding: 10px; border-radius: 8px; cursor: pointer; margin-bottom: 8px; background: #0f172a; }
    .chat-item.active { outline: 2px solid #60a5fa; }
    .tools { font-size: 12px; color: #93c5fd; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="sidebar">
      <button id="newChat">New chat</button>
      <div id="chatList" style="margin-top: 16px"></div>
    </div>
    <div class="main">
      <div id="messages" class="messages"></div>
      <div class="composer">
        <textarea id="input" placeholder="Send a message to Hermes..."></textarea>
        <button id="send">Send</button>
      </div>
    </div>
  </div>
<script>
let currentChat = null;
let eventSource = null;
const messagesEl = document.getElementById('messages');
const chatListEl = document.getElementById('chatList');

function renderMessages(messages) {
  messagesEl.innerHTML = '';
  for (const msg of messages) upsertMessage(msg);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function upsertMessage(msg) {
  let el = document.getElementById('msg-' + msg.id);
  if (!el) {
    el = document.createElement('div');
    el.id = 'msg-' + msg.id;
    el.className = 'msg ' + (msg.role === 'user' ? 'user' : 'assistant');
    messagesEl.appendChild(el);
  }
  el.textContent = msg.content || (msg.status === 'queued' ? '…' : '');
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

async function loadChats() {
  const res = await fetch('/api/conversations');
  const chats = await res.json();
  chatListEl.innerHTML = '';
  for (const chat of chats) {
    const div = document.createElement('div');
    div.className = 'chat-item' + (chat.id === currentChat ? ' active' : '');
    div.textContent = chat.title;
    div.onclick = () => openChat(chat.id);
    chatListEl.appendChild(div);
  }
  if (!currentChat && chats.length) openChat(chats[0].id);
}

async function openChat(id) {
  currentChat = id;
  await loadChats();
  const res = await fetch(`/api/conversations/${id}/messages`);
  const messages = await res.json();
  renderMessages(messages);
  if (eventSource) eventSource.close();
  eventSource = new EventSource(`/api/conversations/${id}/events`);
  eventSource.onmessage = (ev) => {
    const event = JSON.parse(ev.data);
    if (event.event === 'message.created') upsertMessage(event.message);
    if (event.event === 'message.delta') {
      const el = document.getElementById('msg-' + event.message_id);
      if (el) el.textContent = (el.textContent || '') + (event.delta || '');
    }
    if (event.event === 'message.completed') {
      const el = document.getElementById('msg-' + event.message_id);
      if (el) el.textContent = event.content || '';
    }
  };
}

async function newChat() {
  const res = await fetch('/api/conversations', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({title:'Chat ' + new Date().toLocaleTimeString()})});
  const chat = await res.json();
  await loadChats();
  await openChat(chat.id);
}

async function sendMessage() {
  if (!currentChat) await newChat();
  const input = document.getElementById('input');
  const content = input.value.trim();
  if (!content) return;
  input.value = '';
  await fetch(`/api/conversations/${currentChat}/messages`, {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({content})});
}

document.getElementById('newChat').onclick = newChat;
document.getElementById('send').onclick = sendMessage;
document.getElementById('input').addEventListener('keydown', (e) => { if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') sendMessage(); });
loadChats().then(async () => { const res = await fetch('/api/conversations'); const chats = await res.json(); if (!chats.length) await newChat(); });
</script>
</body>
</html>
