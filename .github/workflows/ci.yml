name: ci

on:
  push:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quick-checks:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install project and dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Compile Python sources
        run: python -m py_compile app/*.py tests/*.py

      - name: Run smoke and UI regression tests
        run: pytest -q tests/test_smoke.py tests/test_traceability_and_mobile_layout.py

  promote-to-main:
    name: promote-to-main
    needs: quick-checks
    if: >-
      github.event_name == 'push' &&
      github.ref_type == 'branch' &&
      github.ref_name != 'main' &&
      !startsWith(github.ref_name, 'dependabot/') &&
      !startsWith(github.ref_name, 'renovate/')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    concurrency:
      group: promote-main
      cancel-in-progress: false

    steps:
      - name: Check out main with full history
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.TAILCHAT_AUTOPROMOTE_TOKEN || github.token }}

      - name: Fast-forward main to the verified branch commit
        env:
          BRANCH: ${{ github.ref_name }}
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch --no-tags origin \
            "+refs/heads/main:refs/remotes/origin/main" \
            "+refs/heads/${BRANCH}:refs/remotes/origin/${BRANCH}"

          actual_sha=$(git rev-parse "refs/remotes/origin/${BRANCH}")
          if [[ "$actual_sha" != "$EXPECTED_SHA" ]]; then
            echo "Branch moved while CI was running: expected $EXPECTED_SHA, found $actual_sha" >&2
            exit 1
          fi

          git checkout main
          git reset --hard origin/main
          git merge --ff-only "$EXPECTED_SHA"
          git push origin HEAD:main
