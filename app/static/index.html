<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hermes Tailchat</title>
  <style>
    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body { font-family: system-ui, sans-serif; margin: 0; background: #111827; color: #e5e7eb; overflow-x: hidden; }
    .wrap {
      display: grid;
      grid-template-columns: minmax(240px, 300px) minmax(0, 1fr);
      min-height: 100vh;
      min-height: 100dvh;
    }
    .sidebar {
      border-right: 1px solid #374151;
      padding: 16px;
      overflow: auto;
      min-width: 0;
    }
    .main {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      min-width: 0;
      min-height: 100vh;
      min-height: 100dvh;
    }
    .topbar {
      display:flex;
      justify-content: space-between;
      align-items: flex-start;
      gap:12px;
      padding: 12px 16px;
      border-bottom: 1px solid #374151;
    }
    .messages {
      padding: 16px;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-width: 0;
    }
    .composer {
      border-top: 1px solid #374151;
      padding: 16px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 8px;
      align-items: end;
    }
    .msg {
      padding: 10px 12px;
      border-radius: 12px;
      max-width: min(900px, 100%);
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    .user { background: #1d4ed8; align-self: flex-end; }
    .assistant { background: #1f2937; align-self: flex-start; }
    .system {
      background: #3f3f46;
      align-self: center;
      color: #d1d5db;
      max-width: min(760px, 100%);
    }
    button, input, textarea { font: inherit; }
    input, textarea {
      background: #0f172a;
      color: #e5e7eb;
      border: 1px solid #374151;
      border-radius: 8px;
      padding: 10px;
      width: 100%;
      min-width: 0;
    }
    textarea {
      min-height: 52px;
      resize: vertical;
    }
    button {
      background: #2563eb;
      color: white;
      border: 0;
      border-radius: 8px;
      padding: 10px 14px;
      cursor: pointer;
      min-height: 44px;
    }
    button.secondary { background: #334155; }
    .chat-item {
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 8px;
      background: #0f172a;
      overflow: hidden;
    }
    .chat-item.active { outline: 2px solid #60a5fa; }
    .chat-item > div:first-child {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .meta { font-size: 12px; color: #93c5fd; }
    .session-link {
      display: flex;
      flex-direction: column;
      gap: 2px;
      align-items: flex-end;
      text-align: right;
      max-width: min(100%, 460px);
      overflow-wrap: anywhere;
    }
    .section { margin-top: 18px; }
    .job, .approval {
      padding: 8px;
      border: 1px solid #374151;
      border-radius: 8px;
      margin-bottom: 8px;
      background: #0b1220;
      overflow-wrap: anywhere;
    }
    .approval button { margin-right: 6px; margin-top: 8px; }
    .tool-event {
      color: #93c5fd;
      font-size: 12px;
      overflow-wrap: anywhere;
    }
    .attach-panel {
      margin-top: 12px;
      padding: 12px;
      border: 1px solid #374151;
      border-radius: 10px;
      background: #0b1220;
      display: none;
      gap: 10px;
    }
    .attach-panel.open {
      display: grid;
    }
    .attach-list {
      display: grid;
      gap: 8px;
      max-height: 240px;
      overflow: auto;
    }
    .attach-session {
      padding: 10px;
      border: 1px solid #374151;
      border-radius: 8px;
      background: #0f172a;
      cursor: pointer;
      text-align: left;
    }
    .attach-session.active {
      border-color: #60a5fa;
      outline: 1px solid #60a5fa;
    }
    .attach-session:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .attach-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    @media (max-width: 900px) {
      .wrap {
        grid-template-columns: 1fr;
        grid-template-rows: auto minmax(0, 1fr);
      }
      .sidebar {
        border-right: 0;
        border-bottom: 1px solid #374151;
        max-height: 38vh;
      }
      .main {
        min-height: 0;
      }
      .topbar {
        flex-direction: column;
        align-items: stretch;
      }
      .session-link {
        align-items: stretch;
        text-align: left;
      }
      .messages {
        padding: 12px;
      }
      .composer {
        grid-template-columns: 1fr 1fr;
      }
      .composer textarea {
        grid-column: 1 / -1;
      }
      .msg,
      .system {
        max-width: 100%;
      }
    }

    @media (max-width: 640px) {
      body {
        font-size: 15px;
      }
      .sidebar,
      .topbar,
      .composer {
        padding: 12px;
      }
      .sidebar {
        max-height: none;
      }
      .composer {
        grid-template-columns: 1fr;
      }
      .composer textarea {
        min-height: 96px;
      }
      button {
        width: 100%;
      }
      .messages {
        gap: 10px;
      }
    }

    @media (orientation: landscape) and (max-width: 900px) {
      .wrap {
        grid-template-columns: minmax(220px, 280px) minmax(0, 1fr);
        grid-template-rows: none;
      }
      .sidebar {
        border-right: 1px solid #374151;
        border-bottom: 0;
        max-height: none;
      }
      .composer {
        grid-template-columns: minmax(0, 1fr) auto auto;
      }
      .composer textarea {
        grid-column: auto;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="sidebar">
      <button id="newChat">New chat</button>
      <button id="attachChat" class="secondary" style="margin-top: 8px">Attach Hermes session</button>
      <div id="attachPanel" class="attach-panel" aria-live="polite">
        <div class="meta">Attach an existing Hermes session without reusing the local Tailchat conversation ID.</div>
        <input id="attachTitleOverride" placeholder="Optional Tailchat title override" />
        <div id="attachList" class="attach-list"></div>
        <div id="attachStatus" class="meta">Choose a Hermes session to attach.</div>
        <div class="attach-actions">
          <button id="confirmAttach">Attach selected session</button>
          <button id="cancelAttach" class="secondary">Cancel</button>
        </div>
      </div>
      <div id="chatList" style="margin-top: 16px"></div>
      <div class="section">
        <div class="meta">Background jobs</div>
        <div id="jobs"></div>
      </div>
      <div class="section">
        <div class="meta">Approvals (groundwork)</div>
        <div id="approvals"></div>
      </div>
    </div>
    <div class="main">
      <div class="topbar">
        <div>
          <div style="font-weight:600">Hermes Tailchat</div>
          <div class="meta">Tailnet-only MVP. Auth intentionally skipped for now.</div>
        </div>
        <div class="session-link">
          <div id="status" class="meta">idle</div>
          <div id="sessionMeta" class="meta">No linked Hermes session yet</div>
        </div>
      </div>
      <div id="messages" class="messages"></div>
      <div class="composer">
        <textarea id="input" placeholder="Send a message to Hermes...
Ctrl/Cmd+Enter to send. Shift+Ctrl/Cmd+Enter to queue as a background job."></textarea>
        <button id="background" class="secondary">Queue job</button>
        <button id="send">Send</button>
      </div>
    </div>
  </div>
<script>
let currentChat = null;
let eventSource = null;
const messagesEl = document.getElementById('messages');
const chatListEl = document.getElementById('chatList');
const jobsEl = document.getElementById('jobs');
const approvalsEl = document.getElementById('approvals');
const statusEl = document.getElementById('status');
const sessionMetaEl = document.getElementById('sessionMeta');
const attachPanelEl = document.getElementById('attachPanel');
const attachListEl = document.getElementById('attachList');
const attachStatusEl = document.getElementById('attachStatus');
const attachTitleOverrideEl = document.getElementById('attachTitleOverride');
let attachableSessions = [];
let selectedAttachSessionId = null;
const basePath = (() => {
  const path = window.location.pathname;
  return path.startsWith('/hermes') ? '/hermes' : '';
})();
const apiUrl = (path) => `${basePath}${path}`;

function setStatus(text) { statusEl.textContent = text; }

function renderSessionMeta(chat) {
  if (!chat || !chat.hermes_session_id) {
    sessionMetaEl.textContent = 'No linked Hermes session yet';
    return;
  }
  const parts = [
    `Hermes session: ${chat.hermes_session_id}`,
    `link ${chat.link_mode || 'unknown'} · sync ${chat.sync_state || 'unknown'}`
  ];
  if (chat.hermes_title) parts.push(`Hermes title: ${chat.hermes_title}`);
  if (chat.sync_error) parts.push(`sync warning: ${chat.sync_error}`);
  if (chat.cli_resume_command) parts.push(chat.cli_resume_command);
  sessionMetaEl.textContent = parts.join(' · ');
}

function renderMessages(messages) {
  messagesEl.innerHTML = '';
  for (const msg of messages) upsertMessage(msg);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function upsertMessage(msg) {
  let el = document.getElementById('msg-' + msg.id);
  if (!el) {
    el = document.createElement('div');
    el.id = 'msg-' + msg.id;
    el.className = 'msg ' + (msg.role === 'user' ? 'user' : msg.role === 'system' ? 'system' : 'assistant');
    messagesEl.appendChild(el);
  }
  el.textContent = msg.content || (msg.status === 'queued' ? '…' : '');
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function appendToolEvent(text) {
  const el = document.createElement('div');
  el.className = 'tool-event';
  el.textContent = text;
  messagesEl.appendChild(el);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function renderAttachSessions() {
  attachListEl.innerHTML = '';
  if (!attachableSessions.length) {
    attachStatusEl.textContent = 'No unattached Hermes sessions found.';
    return;
  }
  attachStatusEl.textContent = selectedAttachSessionId ? `Selected ${selectedAttachSessionId}` : 'Choose a Hermes session to attach.';
  for (const session of attachableSessions) {
    const button = document.createElement('button');
    button.type = 'button';
    button.className = 'attach-session' + (session.id === selectedAttachSessionId ? ' active' : '');
    button.innerHTML = `<div>${session.title || 'Untitled session'}</div><div class="meta">${session.id}</div><div class="meta">${session.preview || session.source || 'No preview available'}</div>`;
    button.onclick = () => {
      selectedAttachSessionId = session.id;
      renderAttachSessions();
    };
    attachListEl.appendChild(button);
  }
}

async function openAttachPanel() {
  attachPanelEl.classList.add('open');
  attachStatusEl.textContent = 'Loading Hermes sessions…';
  attachListEl.innerHTML = '';
  selectedAttachSessionId = null;
  try {
    const res = await fetch(apiUrl('/api/hermes/sessions?limit=20'));
    const payload = await res.json().catch(() => ({}));
    if (!res.ok || !Array.isArray(payload)) {
      attachableSessions = [];
      attachStatusEl.textContent = payload.detail || 'Failed to load Hermes sessions.';
      renderAttachSessions();
      return;
    }
    attachableSessions = payload.filter(session => !session.already_attached);
    renderAttachSessions();
  } catch (error) {
    attachableSessions = [];
    attachStatusEl.textContent = `Failed to load Hermes sessions: ${error}`;
    renderAttachSessions();
  }
}

function closeAttachPanel() {
  attachPanelEl.classList.remove('open');
  attachableSessions = [];
  selectedAttachSessionId = null;
  attachTitleOverrideEl.value = '';
  attachListEl.innerHTML = '';
  attachStatusEl.textContent = 'Choose a Hermes session to attach.';
}

async function confirmAttach() {
  if (!selectedAttachSessionId) {
    attachStatusEl.textContent = 'Choose a Hermes session before attaching.';
    return;
  }
  attachStatusEl.textContent = `Attaching ${selectedAttachSessionId}…`;
  const attach = await fetch(apiUrl('/api/conversations/attach'), {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      hermes_session_id: selectedAttachSessionId,
      title: attachTitleOverrideEl.value.trim() || null,
    })
  });
  if (!attach.ok) {
    const error = await attach.json().catch(() => ({}));
    attachStatusEl.textContent = error.detail || 'Failed to attach Hermes session';
    return;
  }
  const chat = await attach.json();
  closeAttachPanel();
  await loadChats();
  await openChat(chat.id);
}

async function loadChats() {
  const res = await fetch(apiUrl('/api/conversations'));
  const chats = await res.json();
  chatListEl.innerHTML = '';
  const currentChatData = chats.find(chat => chat.id === currentChat);
  renderSessionMeta(currentChatData || chats[0] || null);
  for (const chat of chats) {
    const div = document.createElement('div');
    div.className = 'chat-item' + (chat.id === currentChat ? ' active' : '');
    div.innerHTML = `<div>${chat.title}</div><div class="meta">${chat.last_activity_at || chat.created_at}</div><div class="meta">Hermes ${chat.hermes_title || chat.hermes_session_id || 'unlinked'}</div>${chat.sync_error ? `<div class="meta">sync warning: ${chat.sync_error}</div>` : ''}`;
    div.onclick = () => openChat(chat.id);
    chatListEl.appendChild(div);
  }
  if (!currentChat && chats.length) openChat(chats[0].id);
}

async function loadJobs() {
  if (!currentChat) return;
  const res = await fetch(apiUrl(`/api/conversations/${currentChat}/jobs`));
  const jobs = await res.json();
  jobsEl.innerHTML = jobs.map(job => `<div class="job"><div>${job.prompt}</div><div class="meta">${job.status} · run_after ${job.run_after}</div></div>`).join('') || '<div class="meta">No jobs yet</div>';
}

async function loadApprovals() {
  if (!currentChat) return;
  const res = await fetch(apiUrl(`/api/conversations/${currentChat}/approvals`));
  const approvals = await res.json();
  approvalsEl.innerHTML = '';
  if (!approvals.length) {
    approvalsEl.innerHTML = '<div class="meta">No approvals observed yet</div>';
    return;
  }
  for (const approval of approvals) {
    const div = document.createElement('div');
    div.className = 'approval';
    div.innerHTML = `<div>${approval.summary}</div><div class="meta">${approval.status}</div>`;
    if (approval.status === 'pending') {
      const approve = document.createElement('button');
      approve.textContent = 'Approve';
      approve.onclick = () => resolveApproval(approval.id, 'approved');
      const deny = document.createElement('button');
      deny.textContent = 'Deny';
      deny.className = 'secondary';
      deny.onclick = () => resolveApproval(approval.id, 'denied');
      div.appendChild(approve);
      div.appendChild(deny);
    }
    approvalsEl.appendChild(div);
  }
}

async function resolveApproval(id, resolution) {
  await fetch(apiUrl(`/api/approvals/${id}/resolve`), {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({resolution})});
  await loadApprovals();
}

async function openChat(id) {
  currentChat = id;
  await loadChats();
  const res = await fetch(apiUrl(`/api/conversations/${id}/messages`));
  const messages = await res.json();
  renderMessages(messages);
  await loadJobs();
  await loadApprovals();
  if (eventSource) eventSource.close();
  eventSource = new EventSource(apiUrl(`/api/conversations/${id}/events`));
  eventSource.onmessage = async (ev) => {
    const event = JSON.parse(ev.data);
    if (event.event === 'message.created') upsertMessage(event.message);
    if (event.event === 'message.delta') {
      const el = document.getElementById('msg-' + event.message_id);
      if (el) el.textContent = (el.textContent || '') + (event.delta || '');
      setStatus('streaming');
    }
    if (event.event === 'message.completed') {
      const el = document.getElementById('msg-' + event.message_id);
      if (el) el.textContent = event.content || '';
      setStatus('idle');
      await loadJobs();
    }
    if (event.event === 'message.error') {
      const el = document.getElementById('msg-' + event.message_id);
      if (el) el.textContent = '[error] ' + event.error;
      setStatus('error');
      await loadJobs();
    }
    if (event.event === 'job.queued' || event.event === 'job.started') {
      await loadJobs();
      appendToolEvent(`${event.event}: ${(event.job && event.job.prompt) || ''}`);
    }
    if (event.event === 'approval.created' || event.event === 'approval.resolved') {
      await loadApprovals();
      appendToolEvent(event.event);
    }
    if (event.event === 'tool.started') appendToolEvent(`tool started: ${event.tool}${event.preview ? ' — ' + event.preview : ''}`);
    if (event.event === 'tool.completed') appendToolEvent(`tool completed: ${event.tool}${event.error ? ' (error)' : ''}`);
    if (event.event === 'reasoning.available') appendToolEvent(`reasoning available`);
  };
}

async function newChat() {
  const res = await fetch(apiUrl('/api/conversations'), {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({title:'Chat ' + new Date().toLocaleTimeString()})});
  const chat = await res.json();
  await loadChats();
  await openChat(chat.id);
}

async function sendMessage(background = false) {
  if (!currentChat) await newChat();
  const input = document.getElementById('input');
  const content = input.value.trim();
  if (!content) return;
  input.value = '';
  setStatus(background ? 'job queued' : 'running');
  if (background) {
    await fetch(apiUrl(`/api/conversations/${currentChat}/jobs`), {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({prompt: content, delay_seconds: 0})});
    await loadJobs();
    return;
  }
  await fetch(apiUrl(`/api/conversations/${currentChat}/messages`), {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({content})});
}

document.getElementById('newChat').onclick = newChat;
document.getElementById('attachChat').onclick = openAttachPanel;
document.getElementById('confirmAttach').onclick = confirmAttach;
document.getElementById('cancelAttach').onclick = closeAttachPanel;
document.getElementById('send').onclick = () => sendMessage(false);
document.getElementById('background').onclick = () => sendMessage(true);
document.getElementById('input').addEventListener('keydown', (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
    e.preventDefault();
    sendMessage(!!e.shiftKey);
  }
});
loadChats().then(async () => {
  const res = await fetch(apiUrl('/api/conversations'));
  const chats = await res.json();
  if (!chats.length) await newChat();
});
</script>
</body>
</html>
